<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Collapsible FAQ</title>
  <link rel="stylesheet" href="faqSection.css">
</head>
<body>
  <h1>FAQs</h1>
  
  <div>
    <h2>Add a New FAQ</h2>
    <form id="faq-form">
      <label for="faq-question">Question</label>
      <input type="text" id="faq-question" placeholder="Enter your question" required />
      <label for="faq-answer">Answer</label>
      <textarea id="faq-answer" placeholder="Enter the answer" required></textarea>
      <button type="submit">Add FAQ</button>
    </form>
  </div>

  <div id="faq-section">
   
  </div>

  <script src="faqSection.js"></script>
</body>
</html>
